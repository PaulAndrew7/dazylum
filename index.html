  <style>
    /* ===== RESET & BASE ===== */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: #0f0f0f;
      color: #e8e8ec;
      overflow-x: hidden;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER ===== */
    .site-header {
      padding: 2rem 1.5rem 1rem;
      max-width: 1440px;
      width: 100%;
      margin: 0 auto;
    }

    .site-header h1 {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #e8e8ec;
    }

    .site-header .tagline {
      font-size: 0.82rem;
      color: #8a8a96;
      margin-top: 0.25rem;
      font-weight: 400;
    }

    /* ===== GAME GRID ===== */
    .game-grid {
      flex: 1;
      max-width: 1440px;
      width: 100%;
      margin: 0 auto;
      padding: 1rem 1.5rem 3rem;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.25rem;
      align-content: start;
    }

    @media (min-width: 540px) {
      .game-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 820px) {
      .game-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 1.4rem;
      }
    }

    @media (min-width: 1100px) {
      .game-grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    @media (min-width: 1380px) {
      .game-grid {
        grid-template-columns: repeat(6, 1fr);
      }
    }

    /* ===== CARD ===== */
    .game-card {
      background: #1a1a1f;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
      outline-offset: 2px;
    }

    .game-card:hover,
    .game-card:focus-within {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    /* Cover image wrapper — portrait ratio (3:4) */
    .card-cover {
      position: relative;
      width: 100%;
      padding-top: 133.33%;
      /* 3:4 aspect ratio */
      overflow: hidden;
      background: #15151a;
    }

    .card-cover img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: filter 0.25s ease;
      filter: brightness(0.88);
    }

    .game-card:hover .card-cover img,
    .game-card:focus-within .card-cover img {
      filter: brightness(1);
    }

    /* Fallback placeholder when no cover image */
    .card-cover .cover-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 600;
      color: #5a5a66;
      background: linear-gradient(145deg, #15151a 0%, #1e1e26 100%);
    }

    /* Card body */
    .card-body {
      padding: 0.75rem 0.85rem 0.85rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .card-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: #e8e8ec;
      line-height: 1.3;
    }

    .card-summary {
      font-size: 0.76rem;
      color: #8a8a96;
      line-height: 1.45;
      margin-top: 0.35rem;
      flex: 1;
    }

    .card-steam {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 0.6rem;
      font-size: 0.72rem;
      font-weight: 600;
      color: #3d6ea5;
      text-decoration: none;
      transition: color 0.15s ease;
      align-self: flex-start;
    }

    .card-steam:hover,
    .card-steam:focus {
      color: #6a9fd8;
      outline: none;
    }

    .card-steam svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* ===== FOOTER ===== */
    .site-footer {
      padding: 1.5rem;
      text-align: center;
      font-size: 0.72rem;
      color: #4a4a54;
      letter-spacing: 0.01em;
    }

    /* ===== FOCUS STYLES (accessibility) ===== */
    .game-card:focus-within {

    }

      outline-offset: 2px;
      border-radius: 2px;
    }
  </style>
</head>

      if (game.cover) {

          ? `https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/${appId}/header.jpg`
          : '';

          : `this.parentElement.innerHTML='<div class=\\'cover-placeholder\\' aria-hidden=\\'true\\'>${game.title}</div>';`;
        coverContent = `<img src="${game.cover}" alt="Cover art for ${game.title}" loading="lazy" onerror="${onerrorHandler}">`;

        coverContent = `<div class="cover-placeholder" aria-hidden="true">${game.title}</div>`;
      }

      const steamLink = game.steam
        ? `<a class="card-steam" href="${game.steam}" target="_blank" rel="noopener noreferrer">View on Steam ${steamIcon}</a>`
        : '';

      card.innerHTML = `

        <div class="card-body">
          <h2 class="card-title">${game.title}</h2>
